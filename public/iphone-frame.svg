<svg viewBox="0 0 300 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Titanium/Space Black frame gradient -->
    <linearGradient id="fg" x1="0" y1="0" x2="300" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4A4A4C"/>
      <stop offset="18%"  stop-color="#2C2C2E"/>
      <stop offset="55%"  stop-color="#1A1A1C"/>
      <stop offset="80%"  stop-color="#0E0E10"/>
      <stop offset="100%" stop-color="#3A3A3C"/>
    </linearGradient>
    <!-- Left-edge highlight -->
    <linearGradient id="el" x1="0" y1="310" x2="6" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </linearGradient>
    <!-- Top-edge highlight -->
    <linearGradient id="et" x1="150" y1="0" x2="150" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="sh" x="-25%" y="-10%" width="150%" height="130%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity="0.72"/>
      <feDropShadow dx="0" dy="6"  stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ── MAIN FRAME BODY (evenodd = transparent screen hole) ── -->
  <path
    fill-rule="evenodd"
    filter="url(#sh)"
    fill="url(#fg)"
    d="M50,0 L250,0 Q300,0 300,50 L300,570 Q300,620 250,620 L50,620 Q0,620 0,570 L0,50 Q0,0 50,0 Z
       M52,12 L248,12 Q288,12 288,52 L288,568 Q288,608 248,608 L52,608 Q12,608 12,568 L12,52 Q12,12 52,12 Z"
  />

  <!-- Left-edge shimmer -->
  <rect x="0" y="80" width="4" height="460" rx="2" fill="url(#el)" opacity="0.6"/>
  <!-- Top-edge shimmer -->
  <rect x="80" y="0" width="140" height="3" rx="1.5" fill="url(#et)" opacity="0.7"/>

  <!-- ── DYNAMIC ISLAND ── -->
  <rect x="108" y="16" width="84" height="30" rx="15" fill="#060608"/>
  <!-- Camera lens inside island -->
  <circle cx="176" cy="31" r="5.5" fill="#111114"/>
  <circle cx="176" cy="31" r="3.5" fill="#0A0A0D"/>
  <circle cx="174.5" cy="29.5" r="1.2" fill="rgba(255,255,255,0.12)"/>

  <!-- ── SIDE BUTTONS ── -->
  <!-- Power / Side button (right) -->
  <rect x="297" y="192" width="5" height="76" rx="2.5" fill="#2E2E30"/>
  <rect x="297.5" y="192.5" width="3" height="75" rx="1.5" fill="rgba(255,255,255,0.06)"/>

  <!-- Silent switch (left top) -->
  <rect x="-2" y="148" width="5" height="30" rx="2.5" fill="#2E2E30"/>
  <rect x="-1.5" y="148.5" width="3" height="29" rx="1.5" fill="rgba(255,255,255,0.06)"/>

  <!-- Volume Up (left) -->
  <rect x="-2" y="192" width="5" height="58" rx="2.5" fill="#2E2E30"/>
  <rect x="-1.5" y="192.5" width="3" height="57" rx="1.5" fill="rgba(255,255,255,0.06)"/>

  <!-- Volume Down (left) -->
  <rect x="-2" y="262" width="5" height="58" rx="2.5" fill="#2E2E30"/>
  <rect x="-1.5" y="262.5" width="3" height="57" rx="1.5" fill="rgba(255,255,255,0.06)"/>

  <!-- ── BOTTOM PILL (Home indicator bar) ── -->
  <rect x="112" y="594" width="76" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
</svg>
